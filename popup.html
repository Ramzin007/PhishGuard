<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            width: 320px;
            padding: 0;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }

        .container {
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: #3b82f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        .title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .status-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #10b981;
        }

        .status-text {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #3b82f6;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #475569;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">P</div>
            <div class="title">PhishGuard</div>
        </div>

        <div class="status-card">
            <div class="status-icon">🛡️</div>
            <div class="status-text">Your Browsing is Protected</div>
            <div style="font-size: 0.8rem; color: #94a3b8;">Real-time analysis active</div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="scan-count">--</div>
                <div class="stat-label">Sites Scanned</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="community-reports" style="color: #f59e0b;">0</div>
                <div class="stat-label">Community Reports</div>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button id="report-unsafe" class="report-btn" style="width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: background 0.2s;">
                🚩 Report as Unsafe
            </button>
            <div id="report-status" style="font-size: 0.75rem; text-align: center; margin-top: 8px; color: #94a3b8; display: none;">
                Report submitted successfully!
            </div>
        </div>
    </div>
    <div class="footer">
        PhishGuard v1.0.0 • 8-Hour Hackathon Edition
    </div>
    <script src="popup.js"></script>
</body>
</html>
